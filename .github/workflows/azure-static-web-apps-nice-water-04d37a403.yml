name: CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

jobs:
  # ── Quality Gate ────────────────────────────────────────────────────
  quality:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  # ── Build & Deploy ─────────────────────────────────────────────────
  build_and_deploy_job:
    needs: quality
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_WATER_04D37A403 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_deploy_on_missing_secrets: true
          app_location: "/"
          api_location: "api"
          output_location: "dist"
          api_build_command: "npm install && npm run build"

      - name: Notify Telegram (success)
        if: success() && github.event_name == 'push'
        env:
          NAURO_BOT_TOKEN: ${{ secrets.NAURO_BOT_TOKEN }}
          NAURO_CHAT_ID: ${{ secrets.NAURO_CHAT_ID }}
        run: |
          [ -z "$NAURO_BOT_TOKEN" ] && { echo "NAURO_BOT_TOKEN not set; skipping"; exit 0; }
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          curl -sf -X POST "https://api.telegram.org/bot${NAURO_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${NAURO_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=✅ <b>rosette</b> deployed
          Branch: ${{ github.ref_name }}
          Commit: ${COMMIT_MSG}
          SHA: ${{ github.sha }}
          URL: https://rosette.naurolabs.com" \
            || echo "::warning::Telegram notification failed"

      - name: Notify Telegram (failure)
        if: failure() && github.event_name == 'push'
        env:
          NAURO_BOT_TOKEN: ${{ secrets.NAURO_BOT_TOKEN }}
          NAURO_CHAT_ID: ${{ secrets.NAURO_CHAT_ID }}
        run: |
          [ -z "$NAURO_BOT_TOKEN" ] && { echo "NAURO_BOT_TOKEN not set; skipping"; exit 0; }
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          curl -sf -X POST "https://api.telegram.org/bot${NAURO_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${NAURO_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=❌ <b>rosette</b> deploy FAILED
          Branch: ${{ github.ref_name }}
          Commit: ${COMMIT_MSG}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "::warning::Telegram notification failed"

      - name: Sync landing page order
        if: success() && github.event_name == 'push'
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/samoletovs/naurolabs/dispatches \
            -d '{"event_type": "project-deployed", "client_payload": {"project": "rosette"}}' \
            || echo "::warning::Landing page sync dispatch failed"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_WATER_04D37A403 }}
          action: "close"
          app_location: /
